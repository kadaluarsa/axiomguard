apiVersion: v1
kind: Secret
metadata:
  name: axiomguard-secrets
  namespace: axiomguard
type: Opaque
stringData:
  # Database password - MUST be changed in production
  DB_PASSWORD: ""

  # GCP Service Account JSON (for Vertex AI fallback)
  # Base64 encoded service account key
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ""

  # API Keys for client authentication (comma-separated)
  API_KEYS: ""
---
# Example: Generate secrets with kubectl
# kubectl create secret generic axiomguard-secrets \
#   --from-literal=DB_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=API_KEYS=$(openssl rand -base64 32) \
#   -n axiomguard
