apiVersion: v1
kind: Service
metadata:
  name: shield
  namespace: axiomguard
  labels:
    app: shield
spec:
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
  selector:
    app: shield
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield
  namespace: axiomguard
  labels:
    app: shield
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shield
  template:
    metadata:
      labels:
        app: shield
    spec:
      containers:
      - name: shield
        image: gcr.io/PROJECT_ID/axiomguard-shield:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
          name: grpc
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: axiomguard-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: axiomguard-secrets
              key: DB_PASSWORD
        - name: GOOGLE_APPLICATION_CREDENTIALS_JSON
          valueFrom:
            secretKeyRef:
              name: axiomguard-secrets
              key: GOOGLE_APPLICATION_CREDENTIALS_JSON
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
        startupProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shield-hpa
  namespace: axiomguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shield
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
