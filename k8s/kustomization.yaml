apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiomguard

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - postgres.yaml
  - vllm.yaml
  - shield.yaml
  - proxy.yaml
  - ingress.yaml

configMapGenerator:
  - name: axiomguard-config
    behavior: merge
    literals:
      - RUST_LOG=info

images:
  - name: gcr.io/PROJECT_ID/axiomguard-shield
    newTag: latest
  - name: gcr.io/PROJECT_ID/axiomguard-proxy
    newTag: latest

# Example patches for production
# patchesStrategicMerge:
#   - patches/production-resources.yaml

commonLabels:
  app.kubernetes.io/part-of: axiomguard
  app.kubernetes.io/managed-by: kubectl
