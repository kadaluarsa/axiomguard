version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb-ha:pg15
    container_name: axiomguard-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-axiomguard}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-axiomguard}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiomguard} -d ${POSTGRES_DB:-axiomguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  axiomguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axiomguard
    ports:
      - "50051:50051"  # gRPC service
      - "9090:9090"    # Prometheus metrics
    environment:
      - RUST_LOG=info
      - DATABASE_URL=${DATABASE_URL:-postgresql://axiomguard:changeme@timescaledb:5432/axiomguard}
    volumes:
      - ./config.toml:/etc/axiomguard/config.toml
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - axiomguard
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data:
  timescaledb_data:
